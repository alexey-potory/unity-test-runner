name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: read

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            asset: unity-test-runner-windows-x86_64.exe
            binary: target/release/unity-test-runner.exe
          - os: ubuntu-latest
            asset: unity-test-runner-linux-x86_64
            binary: target/release/unity-test-runner
          - os: macos-15-intel
            asset: unity-test-runner-macos-x86_64
            binary: target/release/unity-test-runner
          - os: macos-latest
            asset: unity-test-runner-macos-aarch64
            binary: target/release/unity-test-runner

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v6

      - name: Verify tag matches Cargo version
        shell: pwsh
        run: |
          $metadata = cargo metadata --no-deps --format-version 1 | ConvertFrom-Json
          $expectedTag = "v$($metadata.packages[0].version)"
          if ($env:GITHUB_REF_NAME -ne $expectedTag) {
            throw "Tag $env:GITHUB_REF_NAME does not match Cargo version $expectedTag"
          }

      - run: cargo test --locked --all-targets

      - run: cargo build --release --locked

      - name: Package binary and checksum
        shell: pwsh
        run: |
          New-Item dist -ItemType Directory -Force | Out-Null
          $asset = "${{ matrix.asset }}"
          Copy-Item "${{ matrix.binary }}" "dist/$asset"
          $hash = (Get-FileHash "dist/$asset" -Algorithm SHA256).Hash.ToLowerInvariant()
          "$hash  $asset" | Set-Content "dist/$asset.sha256" -NoNewline

      - uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.asset }}
          path: dist/*
          if-no-files-found: error
          retention-days: 1

  publish:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v8
        with:
          path: dist
          merge-multiple: true

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release upload "$GITHUB_REF_NAME" dist/* --clobber
          else
            gh release create "$GITHUB_REF_NAME" dist/* --verify-tag --generate-notes --title "$GITHUB_REF_NAME"
          fi